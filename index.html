<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>GLA Timetable</title>
  <meta name="description" content="GLA University class schedule — always know where to be." />
  <meta name="theme-color" content="#1a4731" id="theme-meta" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GLA Timetable" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root { --display: 'Plus Jakarta Sans', sans-serif; --mono: 'DM Mono', monospace; }
    body.dark {
      --bg:#0c1410; --surface:#131f18; --surface2:#1a2b22; --surface3:#213629;
      --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
      --text:#e8f5ee; --text2:#8ab39a; --text3:#4a6b57;
      --accent:#4eba87; --accent-bg:rgba(78,186,135,0.12); --accent-text:#4eba87;
      --nav-bg:#0c1410; --red:#ff7070; --red-bg:rgba(255,112,112,0.12);
      --amber:#fbbf24; --amber-bg:rgba(251,191,36,0.12);
      --grid-head:#1a2b22; --grid-cell:#131f18; --grid-active:rgba(78,186,135,0.18);
    }
    body.light {
      --bg:#f0f7f3; --surface:#ffffff; --surface2:#e8f4ee; --surface3:#d4eade;
      --border:rgba(0,0,0,0.07); --border2:rgba(0,0,0,0.13);
      --text:#0d2318; --text2:#2d6647; --text3:#7aaa8d;
      --accent:#1f5a3e; --accent-bg:rgba(31,90,62,0.1); --accent-text:#1a4731;
      --nav-bg:#ffffff; --red:#c0392b; --red-bg:rgba(192,57,43,0.1);
      --amber:#b45309; --amber-bg:rgba(180,83,9,0.1);
      --grid-head:#e8f4ee; --grid-cell:#ffffff; --grid-active:rgba(31,90,62,0.12);
    }
    body { font-family: var(--display); background:var(--bg); color:var(--text); min-height:100dvh; transition:background .3s,color .3s; overscroll-behavior:none; }
    .app { max-width:430px; margin:0 auto; min-height:100dvh; display:flex; flex-direction:column; position: relative; }

    .topbar { display:flex; align-items:center; justify-content:space-between; padding:14px 20px; border-bottom:1px solid var(--border); background:var(--bg); position:sticky; top:0; z-index:100; }
    .topbar-uni { font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--accent); font-family:var(--mono); cursor: pointer; }
    .topbar-date { font-size:13px; font-weight:600; color:var(--text2); }
    .topbar-clock { font-family:var(--mono); font-size:22px; font-weight:500; color:var(--text); }

    .install-banner { margin:12px 16px 0; background:var(--accent-bg); border:1px solid var(--accent); border-radius:12px; padding:12px 14px; display:none; align-items:center; gap:10px; }
    .install-banner.show { display:flex; }

    .day-row { display:flex; gap:6px; padding:12px 16px; overflow-x:auto; border-bottom:1px solid var(--border); scrollbar-width:none; }
    .day-pill { flex-shrink:0; padding:6px 13px; border-radius:20px; font-size:11px; font-weight:700; text-transform:uppercase; font-family:var(--mono); cursor:pointer; border:1px solid var(--border2); color:var(--text2); }
    .day-pill.active { background:var(--accent); border-color:var(--accent); color:#fff; }

    .screen { display:none; flex:1; flex-direction:column; overflow-y:auto; padding-bottom:100px; }
    .screen.active { display:flex; }

    .now-card { background:var(--surface); border:1px solid var(--border2); border-radius:16px; padding:20px; margin:16px; position:relative; overflow:hidden; }
    .now-subject { font-size:28px; font-weight:800; line-height:1.05; margin-bottom:6px; }

    .class-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px 16px; margin:0 16px 10px; display:flex; align-items:flex-start; gap:12px; }
    .del-btn { width:30px; height:30px; background:var(--red-bg); border:none; color:var(--red); border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer; }

    .bottom-nav { 
        display: flex; 
        border-top: 1px solid var(--border); 
        background: var(--nav-bg); 
        position: fixed; 
        bottom: 0; 
        left: 50%; 
        transform: translateX(-50%); 
        width: 100%; 
        max-width: 430px; 
        z-index: 9999; 
        padding-bottom: env(safe-area-inset-bottom, 10px);
    }
    .nav-btn { flex:1; padding:12px 8px 14px; display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none; cursor:pointer; color:var(--text3); font-size:10px; font-weight:700; text-transform:uppercase; }
    .nav-btn.active { color:var(--accent); }
    .nav-icon { font-size:20px; }

    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.65); display:none; align-items:flex-end; justify-content:center; z-index:10000; }
    .modal-overlay.open { display:flex; }
    .modal { background:var(--surface); border-radius:20px 20px 0 0; padding:24px 20px 36px; width:100%; max-width:430px; }

    .toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:var(--text); color:var(--bg); padding:10px 20px; border-radius:20px; font-size:13px; font-weight:700; opacity:0; transition:all .25s; pointer-events:none; z-index:10001; }
    .toast.show { opacity:1; }
  </style>
</head>

<body class="dark">
<div class="app">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-uni">GLA University</span>
      <span class="topbar-date" id="topbar-date">Loading...</span>
    </div>
    <div class="topbar-right">
      <span class="topbar-clock" id="clock">00:00</span>
      <button class="theme-toggle" id="theme-toggle">🌙</button>
    </div>
  </div>

  <div class="install-banner" id="install-banner">
    <div style="flex:1"><strong>📢 Update available</strong><span>Syncing schedule...</span></div>
    <button class="install-btn" id="install-btn">Refresh</button>
  </div>

  <div class="screen active" id="screen-home">
    <div class="day-row" id="day-row"></div>
    <div class="now-section" style="padding:16px 16px 0"><div class="sec-label">Right now</div></div>
    <div class="now-card" id="now-card">
        <div class="free-heading">Loading…</div>
    </div>
    <div class="schedule-section" style="padding:0 16px 16px"><div class="sec-label">Full schedule</div><div id="schedule-list"></div></div>
  </div>

  <div class="screen" id="screen-edit">
    <div style="padding:16px">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px">
        <span style="font-size:18px; font-weight:800">My Classes</span>
        <button class="add-btn" id="open-add-btn" style="padding:8px 16px; background:var(--accent); color:#fff; border:none; border-radius:8px">+ Add</button>
      </div>
      <div class="import-section" style="background:var(--surface2); padding:16px; border-radius:12px; margin-bottom:16px">
        <strong>Global Timetable</strong>
        <div style="display:flex; gap:8px; margin-top:8px">
          <button class="import-btn" id="load-default-btn" style="padding:8px; border:1px solid var(--border2); border-radius:8px; background:var(--surface)">Load</button>
          <button class="import-btn" id="admin-push-btn" style="display:none; padding:8px; background:var(--accent-bg); color:var(--accent); border:1px solid var(--accent); border-radius:8px">Push to Firebase</button>
        </div>
      </div>
      <div id="list-view"></div>
    </div>
  </div>

  <div class="screen" id="screen-share">
    <div style="padding:16px">
      <h2>Share & Import</h2>
      <div class="share-code-box" id="share-code-box" style="background:var(--surface); padding:16px; border-radius:12px; word-break:break-all; margin:16px 0">Add classes first.</div>
      <textarea id="import-paste" class="import-paste" style="width:100%; padding:12px; border-radius:12px; background:var(--surface); color:var(--text); height:80px" placeholder="Paste code here..."></textarea>
      <button id="import-action-btn" style="width:100%; padding:14px; background:var(--accent); color:#fff; border:none; border-radius:12px; margin-top:12px">Import</button>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="nav-btn active" onclick="goScreen('home')"><span class="nav-icon">◉</span>Now</button>
    <button class="nav-btn" onclick="goScreen('edit')"><span class="nav-icon">✦</span>Edit</button>
    <button class="nav-btn" onclick="goScreen('share')"><span class="nav-icon">↑</span>Share</button>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" style="font-weight:800; font-size:18px; margin-bottom:16px">Add/Edit Class</div>
    <input type="text" id="f-subject" placeholder="Subject" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; background:var(--surface2); color:var(--text); border:1px solid var(--border2)">
    <div style="display:flex; gap:10px">
        <input type="text" id="f-block" placeholder="Block" style="flex:1; padding:12px; border-radius:8px; background:var(--surface2); color:var(--text); border:1px solid var(--border2)">
        <input type="text" id="f-room" placeholder="Room" style="flex:1; padding:12px; border-radius:8px; background:var(--surface2); color:var(--text); border:1px solid var(--border2)">
    </div>
    <div style="display:flex; gap:10px; margin-top:10px">
        <input type="time" id="f-start" style="flex:1; padding:12px; border-radius:8px; background:var(--surface2); color:var(--text); border:1px solid var(--border2)">
        <input type="time" id="f-end" style="flex:1; padding:12px; border-radius:8px; background:var(--surface2); color:var(--text); border:1px solid var(--border2)">
    </div>
    <div id="day-chips" class="day-row" style="border:none; padding:16px 0"></div>
    <div style="display:flex; gap:10px; margin-top:10px">
        <button onclick="closeModal()" style="flex:1; padding:12px; border-radius:8px; background:var(--surface2); color:var(--text2); border:none">Cancel</button>
        <button onclick="saveClass()" style="flex:2; padding:12px; border-radius:8px; background:var(--accent); color:#fff; border:none">Save Class</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DAYS_S = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DAYS_F = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const loadC = () => JSON.parse(localStorage.getItem('gla_v2') || '[]');
const saveC = d => { localStorage.setItem('gla_v2', JSON.stringify(d)); renderHome(); renderEditor(); };
const toM = t => { const [h,m]=t.split(':').map(Number); return h*60+m; };
const fmt12 = t => { if(!t) return '--'; const [h,m]=t.split(':').map(Number); return `${h%12||12}:${String(m).padStart(2,'0')} ${h>=12?'PM':'AM'}`; };
const nowM = () => { const n=new Date(); return n.getHours()*60+n.getMinutes(); };

let selectedDays = [];
let viewDay = (new Date().getDay()+6)%7;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function goScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${name}`).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach((b, i) => {
      b.classList.toggle('active', ['home','edit','share'][i] === name);
  });
  if(name==='home') renderHome();
}

function renderDayRow() {
  document.getElementById('day-row').innerHTML = DAYS_S.map((d,i) =>
    `<div class="day-pill ${i===viewDay?'active':''}" onclick="viewDay=${i};renderDayRow();renderHome();">${d}</div>`
  ).join('');
}

function renderHome() {
  const dc = loadC().filter(c=>c.days.includes(viewDay)).sort((a,b)=>toM(a.start)-toM(b.start));
  const card = document.getElementById('now-card');
  const nm = nowM();
  const curr = dc.find(c=>toM(c.start)<=nm && nm<toM(c.end));

  if (curr) {
    card.innerHTML = `<div class="now-subject">${curr.subject}</div><div>${curr.block} · Room ${curr.room}</div><div style="font-family:monospace; margin-top:8px">${fmt12(curr.start)} - ${fmt12(curr.end)}</div>`;
  } else {
    card.innerHTML = `<div class="free-heading">No Class Right Now</div>`;
  }

  document.getElementById('schedule-list').innerHTML = dc.map(c => `
    <div class="sched-row" style="display:flex; gap:15px; padding:12px 0; border-bottom:1px solid var(--border)">
      <div style="font-family:monospace; font-size:12px; min-width:70px">${fmt12(c.start)}<br>${fmt12(c.end)}</div>
      <div><strong>${c.subject}</strong><br><span style="color:var(--text3)">${c.block} · Room ${c.room}</span></div>
    </div>`).join('');
}

function renderEditor() {
  const el = document.getElementById('list-view');
  el.innerHTML = loadC().map((c,i) => `
    <div class="class-card">
      <div style="flex:1">
        <div style="font-size:10px; color:var(--accent)">${c.days.map(d=>DAYS_S[d]).join(' ')}</div>
        <strong>${c.subject}</strong><br>${c.block} · Room ${c.room}
      </div>
      <button class="del-btn" onclick="editClass(${i})" style="background:var(--accent-bg); color:var(--accent); margin-right:5px">✎</button>
      <button class="del-btn" onclick="delClass(${i})">✕</button>
    </div>`).join('');
}

window.editClass = function(i) {
    const c = loadC()[i];
    document.getElementById('f-subject').value = c.subject;
    document.getElementById('f-block').value = c.block;
    document.getElementById('f-room').value = c.room;
    document.getElementById('f-start').value = c.start;
    document.getElementById('f-end').value = c.end;
    selectedDays = [...c.days];
    buildChips();
    const a = loadC(); a.splice(i, 1); localStorage.setItem('gla_v2', JSON.stringify(a));
    document.getElementById('modal').classList.add('open');
};

function delClass(i) { const a = loadC(); a.splice(i,1); saveC(a); }

function buildChips() {
  document.getElementById('day-chips').innerHTML = DAYS_S.map((d,i)=>
    `<div class="day-chip ${selectedDays.includes(i)?'on':''}" style="padding:8px; border:1px solid var(--border2); border-radius:8px; margin-right:5px; cursor:pointer; background:${selectedDays.includes(i)?'var(--accent)':'none'}" onclick="toggleChip(${i})">${d}</div>`
  ).join('');
}
function toggleChip(i) {
  if(selectedDays.includes(i)) selectedDays = selectedDays.filter(d=>d!==i);
  else selectedDays.push(i);
  buildChips();
}

function openModal() { selectedDays=[]; buildChips(); document.getElementById('modal').classList.add('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('open-add-btn').onclick = openModal;

function saveClass() {
  const subject = document.getElementById('f-subject').value;
  const block = document.getElementById('f-block').value;
  const room = document.getElementById('f-room').value;
  const start = document.getElementById('f-start').value;
  const end = document.getElementById('f-end').value;
  if(!subject || selectedDays.length === 0) return alert("Fill Subject and Days");
  const a = loadC(); a.push({subject, block, room, start, end, days:selectedDays});
  saveC(a); closeModal();
}

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  document.getElementById('topbar-date').textContent = `${DAYS_F[(now.getDay()+6)%7].slice(0,3)}, ${now.getDate()} ${MONTHS[now.getMonth()]}`;
}

updateClock(); renderDayRow(); renderHome(); setInterval(updateClock, 10000);
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2dbYAjTvozbeR93_cYf7R99OIwpZuKFw",
  authDomain: "campusnow-6f52a.firebaseapp.com",
  projectId: "campusnow-6f52a",
  storageBucket: "campusnow-6f52a.firebasestorage.app",
  messagingSenderId: "1071603068850",
  appId: "1:1071603068850:web:fe1a6570df8eacb5447eab"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
const timetableRef = doc(db, "timetables", "gla_v2");

// Admin Login (10 taps)
let taps = 0;
document.querySelector('.topbar-uni').onclick = async () => {
    taps++;
    if (taps === 10) {
        try {
            const res = await signInWithPopup(auth, provider);
            if (res.user.email === "parvmishra44@gmail.com") {
                document.getElementById('admin-push-btn').style.display = 'block';
                showToast("Admin Active 🔓");
            }
        } catch (e) { console.error(e); }
        taps = 0;
    }
};

// Admin Push
document.getElementById('admin-push-btn').onclick = async () => {
    const classes = loadC();
    const dayMap = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];
    const payload = { version: Date.now() };
    dayMap.forEach((day, idx) => {
        payload[day] = classes.filter(c => c.days.includes(idx)).map(({days, ...rest}) => rest);
    });
    try { await updateDoc(timetableRef, payload); alert("Synced!"); } catch(e) { alert("Error"); }
};

// Listener
onSnapshot(timetableRef, (docSnap) => {
  if (!docSnap.exists()) return;
  const data = docSnap.data();
  const oldVer = localStorage.getItem("version");
  if (oldVer !== String(data.version)) {
    const dayLookup = { mon: 0, tue: 1, wed: 2, thu: 3, fri: 4, sat: 5, sun: 6 };
    let flat = [];
    Object.keys(data).forEach(key => {
      const idx = dayLookup[key.toLowerCase()];
      if (idx !== undefined && Array.isArray(data[key])) {
        flat = [...flat, ...data[key].map(c => ({...c, days: [idx]}))];
      }
    });
    localStorage.setItem("version", data.version);
    localStorage.setItem("gla_v2", JSON.stringify(flat));
    renderHome(); renderEditor();
  }
});
</script>
</body>
</html>
